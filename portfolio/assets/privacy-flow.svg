<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="O_Chat privacy flow diagram">
  <rect width="1200" height="760" fill="#fbfbf9"/>
  <text x="60" y="70" font-family="Segoe UI, Arial" font-size="34" font-weight="700" fill="#111827">Privacy-Oriented Message Flow</text>
  <text x="60" y="108" font-family="Segoe UI, Arial" font-size="18" fill="#4b5563">The design avoids persistent storage and aims to keep chat content temporary.</text>

  <rect x="80" y="185" width="240" height="120" rx="8" fill="#ffffff" stroke="#0f766e" stroke-width="3"/>
  <text x="115" y="230" font-family="Segoe UI, Arial" font-size="22" font-weight="700" fill="#134e4a">User Types</text>
  <text x="115" y="265" font-family="Segoe UI, Arial" font-size="17" fill="#374151">Message exists in</text>
  <text x="115" y="290" font-family="Segoe UI, Arial" font-size="17" fill="#374151">console memory only</text>

  <rect x="390" y="185" width="240" height="120" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
  <text x="425" y="230" font-family="Segoe UI, Arial" font-size="22" font-weight="700" fill="#1e3a8a">Client Sends</text>
  <text x="425" y="265" font-family="Segoe UI, Arial" font-size="17" fill="#374151">Payload is queued</text>
  <text x="425" y="290" font-family="Segoe UI, Arial" font-size="17" fill="#374151">for socket write</text>

  <rect x="700" y="185" width="240" height="120" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="3"/>
  <text x="735" y="230" font-family="Segoe UI, Arial" font-size="22" font-weight="700" fill="#4c1d95">Server Relays</text>
  <text x="735" y="265" font-family="Segoe UI, Arial" font-size="17" fill="#374151">No database and</text>
  <text x="735" y="290" font-family="Segoe UI, Arial" font-size="17" fill="#374151">no message archive</text>

  <rect x="390" y="420" width="240" height="120" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="3"/>
  <text x="425" y="465" font-family="Segoe UI, Arial" font-size="22" font-weight="700" fill="#9a3412">Client Displays</text>
  <text x="425" y="500" font-family="Segoe UI, Arial" font-size="17" fill="#374151">Recipient sees the</text>
  <text x="425" y="525" font-family="Segoe UI, Arial" font-size="17" fill="#374151">message in console</text>

  <rect x="700" y="420" width="240" height="120" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="3"/>
  <text x="735" y="465" font-family="Segoe UI, Arial" font-size="22" font-weight="700" fill="#991b1b">App Closes</text>
  <text x="735" y="500" font-family="Segoe UI, Arial" font-size="17" fill="#374151">Sockets close and</text>
  <text x="735" y="525" font-family="Segoe UI, Arial" font-size="17" fill="#374151">buffers are cleared</text>

  <path d="M320 245 L390 245" stroke="#111827" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M630 245 L700 245" stroke="#111827" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M820 305 C820 370 570 355 520 420" stroke="#111827" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M630 480 L700 480" stroke="#111827" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="80" y="620" width="1060" height="70" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="110" y="650" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#92400e">Honest security note</text>
  <text x="110" y="675" font-family="Segoe UI, Arial" font-size="17" fill="#78350f">No saved history is valuable, but production privacy also requires verified encryption, key handling, and threat modeling.</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#111827"/>
    </marker>
  </defs>
</svg>
