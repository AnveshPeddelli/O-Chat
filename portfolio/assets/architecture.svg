<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="O_Chat architecture diagram">
  <rect width="1200" height="760" fill="#f8fafc"/>
  <text x="60" y="70" font-family="Segoe UI, Arial" font-size="34" font-weight="700" fill="#111827">O_Chat Architecture</text>
  <text x="60" y="108" font-family="Segoe UI, Arial" font-size="18" fill="#4b5563">One executable can host a room or join an existing room over the local network.</text>

  <rect x="60" y="165" width="310" height="430" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
  <text x="95" y="215" font-family="Segoe UI, Arial" font-size="24" font-weight="700" fill="#1e3a8a">Host Machine</text>
  <rect x="95" y="250" width="240" height="80" rx="8" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="125" y="298" font-family="Segoe UI, Arial" font-size="20" fill="#111827">Server io_context</text>
  <rect x="95" y="365" width="240" height="80" rx="8" fill="#e0f2fe" stroke="#38bdf8"/>
  <text x="124" y="413" font-family="Segoe UI, Arial" font-size="20" fill="#111827">Host Client</text>
  <rect x="95" y="480" width="240" height="70" rx="8" fill="#ecfeff" stroke="#22d3ee"/>
  <text x="124" y="523" font-family="Segoe UI, Arial" font-size="18" fill="#111827">Console UI</text>

  <rect x="455" y="165" width="290" height="430" rx="8" fill="#ffffff" stroke="#059669" stroke-width="3"/>
  <text x="500" y="215" font-family="Segoe UI, Arial" font-size="24" font-weight="700" fill="#065f46">Chat Server</text>
  <rect x="495" y="255" width="210" height="70" rx="8" fill="#d1fae5" stroke="#34d399"/>
  <text x="535" y="298" font-family="Segoe UI, Arial" font-size="19" fill="#111827">Accept TCP</text>
  <rect x="495" y="365" width="210" height="70" rx="8" fill="#dcfce7" stroke="#4ade80"/>
  <text x="535" y="408" font-family="Segoe UI, Arial" font-size="19" fill="#111827">Sessions Set</text>
  <rect x="495" y="475" width="210" height="70" rx="8" fill="#f0fdf4" stroke="#86efac"/>
  <text x="535" y="518" font-family="Segoe UI, Arial" font-size="19" fill="#111827">Broadcast</text>

  <rect x="830" y="165" width="310" height="430" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="3"/>
  <text x="875" y="215" font-family="Segoe UI, Arial" font-size="24" font-weight="700" fill="#4c1d95">Joined Users</text>
  <rect x="870" y="260" width="230" height="70" rx="8" fill="#ede9fe" stroke="#a78bfa"/>
  <text x="920" y="303" font-family="Segoe UI, Arial" font-size="19" fill="#111827">Alice Client</text>
  <rect x="870" y="370" width="230" height="70" rx="8" fill="#f3e8ff" stroke="#c084fc"/>
  <text x="922" y="413" font-family="Segoe UI, Arial" font-size="19" fill="#111827">Bob Client</text>
  <rect x="870" y="480" width="230" height="70" rx="8" fill="#faf5ff" stroke="#d8b4fe"/>
  <text x="910" y="523" font-family="Segoe UI, Arial" font-size="19" fill="#111827">More Clients</text>

  <path d="M335 405 C390 405 405 290 495 290" stroke="#2563eb" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M705 290 C790 290 795 295 870 295" stroke="#059669" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M870 405 C790 405 785 405 705 405" stroke="#7c3aed" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M705 510 C790 510 795 515 870 515" stroke="#059669" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <rect x="60" y="650" width="1080" height="55" rx="8" fill="#111827"/>
  <text x="92" y="685" font-family="Segoe UI, Arial" font-size="19" fill="#ffffff">Key idea: the server manages connections and relays messages; clients own the user-facing chat experience.</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#111827"/>
    </marker>
  </defs>
</svg>
